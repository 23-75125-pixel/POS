<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Set Password · PH-POS</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Optional: your global css -->
  <link rel="stylesheet" href="src/css/main.css">
  <style>
    :root {
      color-scheme: light;
      --sp-bg: var(--bg);
      --sp-card: var(--bg-2);
      --sp-border: var(--line);
      --sp-text: var(--tx-1);
      --sp-muted: var(--tx-3);
      --sp-input-bg: var(--bg-4);
      --sp-input-border: var(--line-2);
      --sp-shadow: 0 10px 28px rgba(15,23,42,0.12);
      --sp-primary: var(--ac);
      --sp-primary-hover: var(--ac-2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --sp-bg: #0f172a;
        --sp-card: #1e293b;
        --sp-border: #334155;
        --sp-text: #f1f5f9;
        --sp-muted: #94a3b8;
        --sp-input-bg: #0f172a;
        --sp-input-border: #334155;
        --sp-shadow: 0 25px 50px rgba(0,0,0,0.4);
      }
    }

    body {
      background: var(--sp-bg) !important;
      color: var(--sp-text);
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    .card {
      background: var(--sp-card);
      border: 1px solid var(--sp-border) !important;
      box-shadow: var(--sp-shadow) !important;
    }

    .text-muted,
    .form-text {
      color: var(--sp-muted) !important;
    }

    .form-control {
      background: var(--sp-input-bg);
      border-color: var(--sp-input-border);
      color: var(--sp-text);
    }

    .form-control:focus {
      border-color: var(--sp-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    .btn-primary {
      background: var(--sp-primary);
      border-color: var(--sp-primary);
    }

    .btn-primary:hover {
      background: var(--sp-primary-hover);
      border-color: var(--sp-primary-hover);
    }

    .auth-nav {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      z-index: 5;
    }
  </style>
</head>
<body class="bg-light">

  <div class="auth-nav">
    <button class="btn btn-secondary btn-sm" id="btnBack"><i class="bi bi-arrow-left"></i> Back</button>
    <button class="btn btn-secondary btn-sm" id="btnHome"><i class="bi bi-house"></i> Home</button>
    <button class="btn btn-secondary btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right"></i> Logout</button>
  </div>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">

        <div class="card shadow-sm border-0 rounded-4">
          <div class="card-body p-4 p-md-5">
            <h3 class="mb-2 fw-bold">Set your password</h3>
            <p class="text-muted mb-4" id="subtitle">
              Please create a new password to continue.
            </p>

            <div class="alert alert-warning d-none" id="linkError"></div>
            <div class="alert alert-success d-none" id="successBox"></div>

            <form id="setPassForm" class="d-none">
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control form-control-lg" id="newPassword"
                       minlength="8" required placeholder="At least 8 characters">
                <div class="form-text">Tip: Use at least 8 characters.</div>
              </div>

              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control form-control-lg" id="confirmPassword"
                       minlength="8" required placeholder="Re-type password">
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100" id="btnSet">
                Set Password
              </button>

              <button type="button" class="btn btn-link w-100 mt-2" id="btnGoLogin">
                Back to Login
              </button>
            </form>

            <div class="d-flex align-items-center gap-2 mt-3" id="loadingRow">
              <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
              <span class="text-muted" id="loadingText">Validating link…</span>
            </div>

          </div>
        </div>

        <div class="text-center text-muted small mt-3">
          PH-POS · Secure password setup
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import db from './src/js/supabaseClient.js';

    const els = {
      form: document.getElementById('setPassForm'),
      newPass: document.getElementById('newPassword'),
      confirm: document.getElementById('confirmPassword'),
      btnSet: document.getElementById('btnSet'),
      btnGoLogin: document.getElementById('btnGoLogin'),
      linkError: document.getElementById('linkError'),
      successBox: document.getElementById('successBox'),
      loadingRow: document.getElementById('loadingRow'),
      loadingText: document.getElementById('loadingText'),
      subtitle: document.getElementById('subtitle'),
    };

    function clearPersistedAuthStorage() {
      try {
        const keysToRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && /^sb-.*-auth-token$/.test(key)) keysToRemove.push(key);
        }
        keysToRemove.forEach(key => localStorage.removeItem(key));
      } catch (_) {}
    }

    async function robustSignOut() {
      try {
        await db.auth.signOut({ scope: 'global' });
      } catch (_) {
        try { await db.auth.signOut({ scope: 'local' }); } catch (_) {}
      } finally {
        clearPersistedAuthStorage();
        localStorage.removeItem('pos_store_id');
      }
    }

    function showError(msg) {
      els.linkError.textContent = msg;
      els.linkError.classList.remove('d-none');
    }

    function showSuccess(msg) {
      els.successBox.textContent = msg;
      els.successBox.classList.remove('d-none');
    }

    function setLoading(isLoading, text = 'Working…') {
      if (isLoading) {
        els.loadingRow.classList.remove('d-none');
        els.loadingText.textContent = text;
        els.form.classList.add('d-none');
      } else {
        els.loadingRow.classList.add('d-none');
        els.form.classList.remove('d-none');
      }
    }

    async function ensureSessionFromLink() {
      // Supabase can send links in two common styles:
      // 1) Code flow (?code=...) -> exchangeCodeForSession()
      // 2) Hash tokens (#access_token=...) -> getSession() will already work after redirect
      const hasCode = new URLSearchParams(window.location.search).get('code');

      if (hasCode) {
        const { data, error } = await db.auth.exchangeCodeForSession(window.location.href);
        if (error) throw error;
        return data?.session;
      }

      // For hash flow, just read session
      const { data: { session }, error } = await db.auth.getSession();
      if (error) throw error;
      return session;
    }

    async function init() {
      try {
        setLoading(true, 'Validating link…');

        const session = await ensureSessionFromLink();

        if (!session?.user) {
          showError('Invalid or expired link. Please request a new invite or password reset.');
          els.btnGoLogin.classList.remove('d-none');
          setLoading(true, 'Link not valid.');
          return;
        }

        // Link is valid, show form
        els.subtitle.textContent = `Logged in as: ${session.user.email || 'your account'}`;
        els.linkError.classList.add('d-none');
        setLoading(false);

      } catch (e) {
        showError(e.message || 'Invalid or expired link.');
        setLoading(true, 'Link error.');
      }
    }

    els.btnGoLogin.addEventListener('click', () => {
      window.location.href = 'login.html';
    });

    document.getElementById('btnBack').addEventListener('click', () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'login.html';
    });

    document.getElementById('btnHome').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    document.getElementById('btnLogout').addEventListener('click', async () => {
      try {
        await robustSignOut();
      } finally {
        window.location.href = `login.html?logged_out=1&t=${Date.now()}`;
      }
    });

    els.form.addEventListener('submit', async (ev) => {
      ev.preventDefault();

      const p1 = els.newPass.value.trim();
      const p2 = els.confirm.value.trim();

      els.linkError.classList.add('d-none');
      els.successBox.classList.add('d-none');

      if (p1.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      if (p1 !== p2) {
        showError('Passwords do not match.');
        return;
      }

      try {
        els.btnSet.disabled = true;
        setLoading(true, 'Setting password…');

        const { error } = await db.auth.updateUser({ password: p1 });
        if (error) throw error;

        showSuccess('Password set successfully! Please login now.');
        setLoading(true, 'Done.');

        // Sign out after setting password (optional but clean)
        await robustSignOut();

        setTimeout(() => {
          window.location.href = `login.html?logged_out=1&t=${Date.now()}`;
        }, 1200);

      } catch (e) {
        showError(e.message || 'Failed to set password. Try again.');
        setLoading(false);
      } finally {
        els.btnSet.disabled = false;
      }
    });

    init();
  </script>

</body>
</html>
